name: Test post-benchmark-report action

on:
  push:
    paths: ['actions/post-benchmark-report/**']
  pull_request:
    paths: ['actions/post-benchmark-report/**']
  workflow_dispatch:

jobs:
  test-upload-success:
    name: Upload succeeds with valid report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy benchmark report
        run: |
          cat > benchmark_metrics.json <<'EOF'
          {
            "latency": { "values": [1.2, 3.4, 5.6] },
            "throughput": { "values": [100, 200, 300] }
          }
          EOF

      - name: Run post-benchmark-report
        id: upload
        uses: ./actions/post-benchmark-report
        with:
          backend_url: https://httpbin.org/anything
          report_path: benchmark_metrics.json
          list_code: 'test-benchmark'
          list_name: 'Test Benchmark'
          header_config: '[{"field":"metric","name":"Metric","required":true,"sortable":true,"type":"string"},{"field":"value","name":"Value","required":true,"sortable":true,"type":"number"}]'
          fail_on_error: 'false'

      - name: Check upload output exists
        run: |
          echo "header_status=${{ steps.upload.outputs.header_status }}"
          echo "upload_status=${{ steps.upload.outputs.upload_status }}"
          echo "Action completed without hard failure"

  test-fail-on-missing-file:
    name: Fails when report file is missing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run post-benchmark-report with missing file
        id: upload
        continue-on-error: true
        uses: ./actions/post-benchmark-report
        with:
          backend_url: https://httpbin.org/anything
          report_path: non_existent_report.json
          list_code: 'test-missing'
          header_config: '[{"field":"metric","name":"Metric","required":true,"sortable":true,"type":"string"}]'
          fail_on_error: 'true'

      - name: Assert step failed
        run: |
          if [ "${{ steps.upload.outcome }}" != "failure" ]; then
            echo "::error::Expected failure but got ${{ steps.upload.outcome }}"
            exit 1
          fi
          echo "Action correctly failed on missing file"

  test-warn-on-missing-file:
    name: Warns but succeeds when fail_on_error is false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run post-benchmark-report with missing file (no fail)
        id: upload
        uses: ./actions/post-benchmark-report
        with:
          backend_url: https://httpbin.org/anything
          report_path: non_existent_report.json
          list_code: 'test-warn'
          header_config: '[{"field":"metric","name":"Metric","required":true,"sortable":true,"type":"string"}]'
          fail_on_error: 'false'

      - name: Assert step succeeded
        run: |
          if [ "${{ steps.upload.outcome }}" != "success" ]; then
            echo "::error::Expected success but got ${{ steps.upload.outcome }}"
            exit 1
          fi
          echo "Action correctly warned but did not fail"

  test-default-input-resolution:
    name: Default inputs are resolved from github context
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy benchmark report
        run: |
          cat > benchmark_metrics.json <<'EOF'
          {
            "test_metric": { "values": [42] }
          }
          EOF

      - name: Run post-benchmark-report (defaults only)
        id: upload
        uses: ./actions/post-benchmark-report
        with:
          backend_url: https://httpbin.org/anything
          report_path: benchmark_metrics.json
          list_code: 'test-defaults'
          header_config: '[{"field":"metric","name":"Metric","required":true,"sortable":true,"type":"string"}]'
          fail_on_error: 'false'

      - name: Verify resolved defaults via upload response
        run: |
          RESPONSE=$(cat /tmp/upload_response.txt 2>/dev/null || echo '{}')
          echo "Response: $RESPONSE"

          # httpbin echoes JSON body back under "json" key
          REPO=$(echo "$RESPONSE" | jq -r '.json.repository_name // empty')
          WORKFLOW=$(echo "$RESPONSE" | jq -r '.json.workflow_id // empty')
          COMMIT=$(echo "$RESPONSE" | jq -r '.json.commit_id // empty')

          echo "repository_name = $REPO"
          echo "workflow_id = $WORKFLOW"
          echo "commit_id = $COMMIT"

          # These should be non-empty when resolved from github context
          if [ -n "$REPO" ]; then
            echo "repository_name resolved correctly"
          else
            echo "::warning::repository_name was empty (httpbin may not echo JSON body)"
          fi

  test-list-name-defaults-to-list-code:
    name: list_name defaults to list_code when not provided
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy benchmark report
        run: |
          cat > benchmark_metrics.json <<'EOF'
          {
            "test_metric": { "values": [1] }
          }
          EOF

      - name: Run post-benchmark-report without list_name
        id: upload
        uses: ./actions/post-benchmark-report
        with:
          backend_url: https://httpbin.org/anything
          report_path: benchmark_metrics.json
          list_code: 'my-list-code'
          header_config: '[{"field":"metric","name":"Metric","required":true,"sortable":true,"type":"string"}]'
          fail_on_error: 'false'

      - name: Verify list_name defaulted to list_code
        run: |
          RESPONSE=$(cat /tmp/header_response.txt 2>/dev/null || echo '{}')
          echo "Header response: $RESPONSE"

          # httpbin echoes JSON body back under "json" key
          LIST_NAME=$(echo "$RESPONSE" | jq -r '.json.list_name // empty')
          echo "list_name = $LIST_NAME"

          if [ "$LIST_NAME" = "my-list-code" ]; then
            echo "list_name correctly defaulted to list_code"
          else
            echo "::warning::Could not verify list_name default (httpbin may not echo JSON body)"
          fi
